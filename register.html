<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up — Pawstop</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/forms.css">
</head>
<body>
<div id="headerMount"></div>

<main class="auth-shell">
  <div class="auth-visual">
    <div style="color:#fff; max-width:380px;">
      <div style="font-size:3rem; margin-bottom:16px;">🐾</div>
      <h2 style="color:#fff; margin-bottom:12px;">Join thousands of pet parents & providers.</h2>
      <p style="color:rgba(255,255,255,.8);">Create an account to start booking care, or list your business and start getting customers today.</p>
    </div>
  </div>
  <div class="auth-box">
    <div class="auth-tabs">
      <a href="login.html">Log In</a>
      <a href="register.html" class="active">Sign Up</a>
    </div>
    <h2 style="margin-bottom:8px;">Create your account</h2>
    <p style="margin-bottom:26px;">It only takes a minute.</p>

    <form id="registerForm" novalidate>
      <div class="role-cards">
        <label class="role-card active-role">
          <input type="radio" name="role" value="customer" checked>
          <div class="r-icon">🐕</div><strong>I'm a Pet Owner</strong><span>Book trusted care</span>
        </label>
        <label class="role-card">
          <input type="radio" name="role" value="provider">
          <div class="r-icon">💼</div><strong>I'm a Provider</strong><span>List my services</span>
        </label>
      </div>

      <div class="form-group" data-field="name">
        <label>Full Name / Business Name</label>
        <input class="form-control" name="name" placeholder="Jane Doe">
        <span class="form-error"></span>
      </div>
      <div class="form-group" data-field="email">
        <label>Email</label>
        <input class="form-control" type="email" name="email" placeholder="you@example.com">
        <span class="form-error"></span>
      </div>
      <div class="form-row" id="providerFields" style="display:none;">
        <div class="form-group">
          <label>Category</label>
          <select class="form-control" name="category">
            <!-- populated by JS -->
          </select>
        </div>
        <div class="form-group">
          <label>City</label>
          <input class="form-control" name="city" placeholder="Colombo">
        </div>
      </div>
      <div class="form-group" data-field="password">
        <label>Password</label>
        <input class="form-control" type="password" name="password" placeholder="At least 6 characters">
        <span class="form-error"></span>
      </div>
      <div class="check-row" style="margin-bottom:20px;">
        <input type="checkbox" required> <span>I agree to the Terms of Service &amp; Privacy Policy</span>
      </div>
      <button class="btn btn-primary btn-block" type="submit">Create Account</button>
    </form>
    <p style="text-align:center; margin-top:24px; font-size:.9rem;">Already have an account? <a href="login.html" style="color:var(--teal); font-weight:600;">Log in</a></p>
  </div>
</main>

<script src="js/storage.js"></script>
<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script src="js/auth.js"></script>
<script>
  window.PAWSTOP.ui.mountChrome('', '');
  const db = window.PAWSTOP.db;
  const catSelect = document.querySelector('select[name=category]');
  db.CATEGORIES.forEach(c => catSelect.add(new Option(c.name, c.id)));

  document.querySelectorAll('input[name=role]').forEach(r => r.addEventListener('change', () => {
    document.getElementById('providerFields').style.display = r.value === 'provider' && r.checked ? 'grid' : 'none';
  }));
</script>
</body>
</html>
