<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — Pawstop</title>
<link rel="stylesheet" href="css/style.css"><link rel="stylesheet" href="css/forms.css">
</head>
<body>
<div id="headerMount"></div>
<main class="container section">
  <div class="section-head" style="max-width:640px;">
    <span class="eyebrow">Get in touch</span>
    <h2>We'd love to hear from you.</h2>
  </div>
  <div style="display:grid; grid-template-columns:1fr 1fr; gap:32px; align-items:flex-start;">
    <div class="card" style="padding:30px;">
      <form id="contactForm" novalidate>
        <div class="form-group" data-field="name"><label>Name</label><input class="form-control" name="name"><span class="form-error">Please enter your name.</span></div>
        <div class="form-group" data-field="email"><label>Email</label><input class="form-control" type="email" name="email"><span class="form-error">Enter a valid email.</span></div>
        <div class="form-group"><label>Subject</label><input class="form-control" name="subject" placeholder="How can we help?"></div>
        <div class="form-group" data-field="message"><label>Message</label><textarea class="form-control" name="message" placeholder="Tell us more..."></textarea><span class="form-error">Please write a short message.</span></div>
        <button class="btn btn-primary btn-block" type="submit">Send Message</button>
      </form>
    </div>
    <div class="card" style="padding:30px;">
      <h3>Other ways to reach us</h3>
      <div style="margin-top:16px; display:flex; flex-direction:column; gap:14px;">
        <div>📧 support@pawstop.demo</div>
        <div>📞 +94 11 234 5678</div>
        <div>📍 Colombo, Sri Lanka</div>
        <div>🕐 Mon–Sat, 8:00 AM – 8:00 PM</div>
      </div>
      <div style="margin-top:20px; height:160px; border-radius:var(--r-md); background:var(--paper-dim); display:flex; align-items:center; justify-content:center; color:var(--ink-soft);">📍 Map placeholder</div>
    </div>
  </div>
</main>
<div id="footerMount"></div>
<script src="js/storage.js"></script>
<script src="js/api.js"></script><script src="js/app.js"></script><script src="js/auth.js"></script>
<script>
  window.PAWSTOP.ui.mountChrome('contact', '');
  const form = document.getElementById('contactForm');
  form.addEventListener('submit', (e) => {
    e.preventDefault();
    let valid = true;
    const nameG = form.querySelector('[data-field=name]'), emailG = form.querySelector('[data-field=email]'), msgG = form.querySelector('[data-field=message]');
    [nameG,emailG,msgG].forEach(g=>g.classList.remove('invalid'));
    if (form.name.value.trim().length < 2){ nameG.classList.add('invalid'); valid=false; }
    if (!window.PAWSTOP.auth.validateEmail(form.email.value.trim())){ emailG.classList.add('invalid'); valid=false; }
    if (form.message.value.trim().length < 5){ msgG.classList.add('invalid'); valid=false; }
    if (!valid) return;
    window.PAWSTOP.ui.toast("Message sent — we'll get back to you soon!");
    form.reset();
  });
</script>
</body>
</html>
